name: Bug Report
description: Report a bug in Magic Starter Laravel
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction Steps
      description: Step-by-step instructions to reproduce the bug.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - Authentication
        - Teams
        - Profile Management
        - Two-Factor Authentication
        - Sessions
        - Notifications
        - Social Login
        - Email Verification
        - Guest Auth
        - Phone OTP
        - Newsletter
        - Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction_code
    attributes:
      label: Minimal Reproduction Code
      description: A minimal code sample that reproduces the issue.
      render: php

  - type: input
    id: package_version
    attributes:
      label: Package Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: laravel_version
    attributes:
      label: Laravel Version
      placeholder: "12.0"
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP Version
      placeholder: "8.4"
    validations:
      required: true
